query RedeemedAllocationsQuery(
  $receiver: Bytes!
  $allocationIds: [Bytes!]
  $first: Int!
  $skip: Int!
) {
  paymentsEscrowTransactions(
    first: $first
    skip: $skip
    orderBy: id
    orderDirection: asc
    where: {
      type: "redeem"
      receiver_: { id: $receiver }
      allocationId_in: $allocationIds
    }
  ) {
    id
    allocationId
    payer {
      id
    }
    timestamp
  }
}
